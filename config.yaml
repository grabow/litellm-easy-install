model_list:
  - model_name: campus-gpt
    litellm_params:
      model: openai/gpt-5.2
      api_base: os.environ/HSOG_URL
      api_key: os.environ/HSOG_KEY
  - model_name: academic
    litellm_params:
      model: openai/glm-4.7
      api_base: os.environ/ACADEMIC_URL
      api_key: os.environ/ACADEMIC_KEY
  - model_name: nvidia
    litellm_params:
      model: openai/deepseek-ai/deepseek-v3.1-terminus
      api_base: os.environ/NVIDIA_URL
      api_key: os.environ/NVIDIA_KEY
      max_tokens: 8192
      temperature: 0
  - model_name: openrouter
    litellm_params:
      model: openai/qwen/qwen3-next-80b-a3b-instruct:free
      api_base: os.environ/OPENROUTER_URL
      api_key: os.environ/OPENROUTER_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
