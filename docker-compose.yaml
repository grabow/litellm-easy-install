services:
  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - litellm_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 20

  litellm:
    image: docker.litellm.ai/berriai/litellm:v1.81.14-stable.gpt-5.4-patch7
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      HSOG_URL: ${HSOG_URL}
      HSOG_KEY: ${HSOG_KEY}
      ACADEMIC_URL: ${ACADEMIC_URL}
      ACADEMIC_KEY: ${ACADEMIC_KEY}
      NVIDIA_URL: ${NVIDIA_URL}
      NVIDIA_KEY: ${NVIDIA_KEY}
      OPENROUTER_URL: ${OPENROUTER_URL}
      OPENROUTER_KEY: ${OPENROUTER_KEY}
    command: --config /app/config.yaml --host 0.0.0.0 --port 4000

volumes:
  litellm_pg:
